name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        shell: bash
        run: |
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

  windows-build:
    needs: setup
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: windows
            llvmarch: x86_64
          - arch: arm64
            runner: windows-arm64
            llvmarch: aarch64
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install compiler toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri "https://github.com/mstorsjo/llvm-mingw/releases/download/20240619/llvm-mingw-20240619-ucrt-${{ matrix.llvmarch }}.zip" -OutFile "${{ runner.temp }}\llvm-mingw-ucrt.zip"
          Expand-Archive -Path "${{ runner.temp }}\llvm-mingw-ucrt.zip" -DestinationPath 'C:\Program Files\'
          $installPath = (Resolve-Path -Path 'C:\Program Files\llvm-mingw-*-ucrt*').Path
          echo "$installPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build desktop app
        shell: pwsh
        run: |
          $env:ARCH='${{ matrix.arch }}'
          ./scripts/build_windows.ps1 app
      - uses: actions/upload-artifact@v4
        with:
          name: build-windows-${{ matrix.arch }}
          path: dist/*

  windows-package:
    needs: [setup, windows-build]
    runs-on: windows
    environment: release
    env:
      VERSION: ${{ needs.setup.outputs.version }}
      KEY_CONTAINER: ${{ vars.KEY_CONTAINER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: actions/download-artifact@v4
        with:
          pattern: build-windows-*
          path: dist
          merge-multiple: true
      - name: Install packaging tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install -y --no-progress innosetup
      - uses: google-github-actions/auth@v2
        with:
          project_id: ollama
          credentials_json: ${{ secrets.GOOGLE_SIGNING_CREDENTIALS }}
      - name: Install signing integration
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://github.com/GoogleCloudPlatform/kms-integrations/releases/download/cng-v1.0/kmscng-1.0-windows-amd64.zip' -OutFile "${{ runner.temp }}\plugin.zip"
          Expand-Archive -Path "${{ runner.temp }}\plugin.zip" -DestinationPath "${{ runner.temp }}\plugin\"
          & "${{ runner.temp }}\plugin\*\kmscng.msi" /quiet
          echo "${{ vars.OLLAMA_CERT }}" > ollama_inc.crt
      - name: Package signed artifacts
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 sign installer appinstaller
      - uses: actions/upload-artifact@v4
        with:
          name: bundles-windows
          path: |
            dist/windows-ollama-app-*.exe
            dist/OllamaSetup.exe
            dist/*.msix
            dist/*.msixbundle
            dist/*.appinstaller

  release:
    needs: [setup, windows-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}
      - uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: dist
          merge-multiple: true
      - name: Create or update release
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.setup.outputs.release_tag }}"
          RELEASE_VERSION="${RELEASE_TAG%%-*}"
          OLD_TAG=$(gh release ls --json name,tagName | jq -r ".[] | select(.name == \"${RELEASE_VERSION}\") | .tagName")
          if [ -n "$OLD_TAG" ]; then
            gh release edit "$OLD_TAG" --tag "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_VERSION" \
              --draft \
              --generate-notes \
              --prerelease
          fi
      - name: Upload artifacts
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.setup.outputs.release_tag }}"
          for payload in dist/windows-ollama-app-*.exe dist/OllamaSetup.exe dist/*.msix dist/*.msixbundle dist/*.appinstaller; do
            [ -e "$payload" ] || continue
            gh release upload "$RELEASE_TAG" "$payload" --clobber
          done
